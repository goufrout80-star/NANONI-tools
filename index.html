<!DOCTYPE html>

    <!-- ═══ STRUCTURED DATA — WebSite (enables sitelinks searchbox) ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NANONI Studio",
      "alternateName": ["NANONI", "NNN Studio", "Nanoni Tools"],
      "url": "https://nanoni.studio",
      "description": "19 AI-powered creative tools in one unified platform. Built for agencies, creators, and brands.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://nanoni.studio/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══ STRUCTURED DATA — Organization (brand authority) ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NANONI Studio",
      "alternateName": "NANONI",
      "url": "https://nanoni.studio",
      "logo": "https://nanoni.studio/logo.svg",
      "description": "AI-powered creative SaaS platform with 19 image generation and transformation tools.",
      "foundingDate": "2026",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contact@nanoni.studio",
        "contactType": "customer support"
      },
      "sameAs": [
        "https://instagram.com/nanonistudio",
        "https://twitter.com/nanonistudio",
        "https://linkedin.com/company/nanonistudio",
        "https://tiktok.com/@nanonistudio"
      ]
    }
    </script>

    <!-- ═══ STRUCTURED DATA — SoftwareApplication ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NANONI Studio",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Web",
      "url": "https://nanoni.studio",
      "description": "19 AI-powered creative tools including Face Swap, Brand DNA, PostFlow, Ad Pack Generator, AI Upscaler and more.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",

        "Relight",

        "Camera Shot Simulator"
      ],
      "creator": {
        "@type": "Organization",
        "name": "NANONI Studio",
        "url": "https://nanoni.studio"
      }
    }
    </script>
